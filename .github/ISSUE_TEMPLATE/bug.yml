name: 缺陷报告
description: 报告可复现的问题或集成测试失败
title: "[缺陷] "
labels: ["bug"]
body:
  - type: textarea
    id: environment
    attributes:
      label: 环境与版本
      description: 软件提交、设备、固件和连接方式。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果与日志
    validations:
      required: true
