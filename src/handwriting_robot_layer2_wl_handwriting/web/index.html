<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#ffffff">
    <title>手机笔迹采集</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <header class="app-header">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M5 18.5 6.2 14 16.7 3.5a2.1 2.1 0 0 1 3 3L9.2 17 5 18.5Z"/><path d="m14.8 5.4 3 3M5.8 14.4l3.8 3.8"/></svg>
        </div>
        <h1>手机笔迹采集</h1>
        <button class="writer-button" id="writerButton" type="button" title="切换书写者">
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>
          <span id="writerLabel">未选择</span>
        </button>
        <div class="connection" id="connectionState" role="status">
          <span class="connection-dot" aria-hidden="true"></span>
          <span>连接中</span>
        </div>
      </header>

      <main class="workspace">
        <section class="target-strip" aria-label="当前字符">
          <button class="icon-button" id="previousButton" type="button" title="上一个字符" aria-label="上一个字符">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="target-block">
            <strong id="targetCharacter">--</strong>
            <span id="targetMetadata">等待加载字符集</span>
          </div>
          <button class="icon-button" id="nextButton" type="button" title="下一个字符" aria-label="下一个字符">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </section>

        <section class="capture-controls" aria-label="采集设置">
          <label class="position-control">
            <span>序号</span>
            <input id="positionInput" type="number" min="1" value="1" inputmode="numeric">
            <span id="positionTotal">/ 0</span>
          </label>
          <label class="search-control">
            <span class="sr-only">查找字符</span>
            <input id="searchInput" type="text" maxlength="2" placeholder="查找字符" autocomplete="off">
          </label>
          <label class="variant-control">
            <span>变体</span>
            <select id="variantSelect">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </label>
        </section>

        <section class="progress-band" aria-label="采集进度">
          <progress id="progressBar" value="0" max="1140"></progress>
          <span id="progressText">0 / 1140</span>
          <span class="sample-state" id="sampleState">尚未采集</span>
        </section>

        <section class="canvas-region" aria-label="笔迹画布">
          <canvas id="writingCanvas" aria-label="手写输入区域"></canvas>
        </section>

        <section class="sample-stats" aria-live="polite">
          <span id="strokeCount">笔画 0</span>
          <span id="pointCount">轨迹点 0</span>
          <span id="inputSource">输入 --</span>
        </section>
      </main>

      <footer class="action-bar">
        <button class="icon-button action-icon" id="undoButton" type="button" title="撤销上一笔" aria-label="撤销上一笔">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M9 7 4 12l5 5"/><path d="M5 12h8a6 6 0 0 1 6 6"/></svg>
        </button>
        <button class="icon-button action-icon danger" id="clearButton" type="button" title="清空当前画布" aria-label="清空当前画布">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/></svg>
        </button>
        <div class="action-spacer"></div>
        <button class="command-button secondary" id="saveButton" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 4h12l2 2v14H5V4Z"/><path d="M8 4v6h8V4M8 20v-6h8v6"/></svg>
          保存
        </button>
        <button class="command-button primary" id="saveNextButton" type="button">
          保存并继续
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </footer>
    </div>

    <dialog class="writer-dialog" id="writerDialog">
      <form method="dialog" id="writerForm">
        <div class="dialog-header">
          <h2>选择书写者</h2>
          <button class="icon-button" id="closeWriterDialog" type="button" title="关闭" aria-label="关闭">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <label>
          <span>书写者编号</span>
          <input id="writerIdInput" name="writer_id" required maxlength="80" autocomplete="username" placeholder="user_01">
        </label>
        <label>
          <span>姓名或备注</span>
          <input id="writerNameInput" name="writer_name" maxlength="80" autocomplete="name" placeholder="可留空">
        </label>
        <button class="command-button primary full-width" type="submit">进入采集</button>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
